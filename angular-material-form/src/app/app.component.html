<form>
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        Application Form
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="row">
        <div class="col-sm-6">
          <mat-form-field>
            <mat-label>First name</mat-label>
            <input matInput>
          </mat-form-field>
        </div>
        <div class="col-sm-6">
          <mat-form-field>
            <input matInput placeholder="last name" />
          </mat-form-field>
        </div>
      </div>


      <div class="row">
        <div class="col-sm-6">
          <mat-form-field>
            <textarea matInput placeholder="Address"></textarea>
          </mat-form-field>
        </div>

      </div>
    </mat-card-content>
  </mat-card>
</form>
