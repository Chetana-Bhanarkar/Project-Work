<div class="container">
  <div>
    <button (click)="Dice1()" name="sum1" [(ngModel)]="sum1">Dice1</button>
    {{sum1}}
    <select name="" [(ngModel)]="selectedOperator">
      <option [value]="undefined" disabled [selected]="true">Operator</option>
      <option *ngFor="let operator of operators" [value]="operator">{{operator}}</option>
    </select>
    <button (click)="Dice2()" name="sum2" [(ngModel)]="sum2">Dice2</button>
    {{sum2}}
   <div>
      <button (click)="performCalculation()" [(ngModel)]="output">Output</button>
{{output}}
    </div>
  </div>
</div>
